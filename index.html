<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InkDrop</title>
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
    }
    html, body {
      width: 100%; height: 100%; overflow: hidden; background: #fff;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    #canvas {
      display: block;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      cursor: crosshair;
      touch-action: none;
    }

    /* ── Toolbar ─────────────────────────────────────────── */
    #toolbar {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 200;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 18px;
      background: rgba(255, 255, 255, 0.93);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(0, 0, 0, 0.07);
      border-radius: 20px;
      box-shadow:
        0 2px 8px rgba(0,0,0,0.06),
        0 8px 40px rgba(0,0,0,0.05),
        inset 0 1px 0 rgba(255,255,255,0.95);
      white-space: nowrap;
    }

    .tb-sep {
      width: 1px;
      height: 20px;
      background: rgba(0,0,0,0.09);
      margin: 0 10px;
      flex-shrink: 0;
    }

    .tb-group {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    /* Color swatches */
    .swatch {
      width: 20px; height: 20px;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .swatch:hover { transform: scale(1.28); }
    .swatch.active {
      transform: scale(1.15);
      box-shadow: 0 0 0 2px #fff, 0 0 0 3.5px rgba(0,0,0,0.32);
    }

    /* Size buttons */
    .size-btn {
      width: 34px; height: 34px;
      border-radius: 9px;
      border: 1.5px solid transparent;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, border-color 0.12s;
      flex-shrink: 0;
    }
    .size-btn:hover { background: rgba(0,0,0,0.04); }
    .size-btn.active {
      background: rgba(0,0,0,0.06);
      border-color: rgba(0,0,0,0.14);
    }
    .size-dot {
      border-radius: 50%;
      background: #2a2a2a;
      flex-shrink: 0;
    }

    /* Current buttons */
    .cur-btn {
      height: 28px;
      padding: 0 9px;
      border-radius: 7px;
      border: 1.5px solid transparent;
      background: transparent;
      cursor: pointer;
      font-size: 11.5px;
      font-weight: 500;
      color: #777;
      letter-spacing: -0.01em;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .cur-btn:hover { background: rgba(0,0,0,0.04); color: #333; }
    .cur-btn.active {
      background: rgba(0,0,0,0.06);
      border-color: rgba(0,0,0,0.13);
      color: #111;
    }

    /* Action buttons */
    .act-btn {
      height: 28px;
      padding: 0 12px;
      border-radius: 7px;
      border: 1.5px solid rgba(0,0,0,0.13);
      background: transparent;
      cursor: pointer;
      font-size: 11.5px;
      font-weight: 500;
      color: #444;
      letter-spacing: -0.01em;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .act-btn:hover {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.22);
      color: #111;
    }
    .act-btn:active { background: rgba(0,0,0,0.08); }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="toolbar">
  <div class="tb-group" id="color-group"></div>
  <div class="tb-sep"></div>
  <div class="tb-group" id="size-group"></div>
  <div class="tb-sep"></div>
  <div class="tb-group" id="cur-group"></div>
  <div class="tb-sep"></div>
  <div class="tb-group">
    <button class="act-btn" id="btn-clear">Clear</button>
    <button class="act-btn" id="btn-export">Export PNG</button>
  </div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════

const INK_COLORS = [
  { name: 'Ink Black',   hex: '#2a2a35' },
  { name: 'Soft Pink',   hex: '#f2a0b8' },
  { name: 'Lavender',    hex: '#a98fd1' },
  { name: 'Mint',        hex: '#72c4be' },
  { name: 'Peach',       hex: '#f0a888' },
  { name: 'Powder Blue', hex: '#82b8e8' },
  { name: 'Warm Cream',  hex: '#e2c888' },
];

const DROP_SIZES = [
  { label: 'S', dotPx: 4,  factor: 0.14 },
  { label: 'M', dotPx: 8,  factor: 0.27 },
  { label: 'L', dotPx: 13, factor: 0.46 },
];

const WATER_CURRENTS = [
  { label: 'Still',    vx:  0, vy:  0 },
  { label: '← Drift',  vx: -1, vy:  0 },
  { label: 'Drift →',  vx:  1, vy:  0 },
  { label: 'Drift ↓',  vx:  0, vy:  1 },
];

// Each blob layer: [radiusFactor, peakAlpha, numPoints, irregularity]
const BLOB_LAYERS = [
  [1.00, 0.038, 11, 0.58],  // outermost whisper
  [0.82, 0.080, 13, 0.45],  // outer feather
  [0.63, 0.165, 15, 0.32],  // outer body
  [0.44, 0.300, 17, 0.22],  // inner body
  [0.25, 0.520, 19, 0.14],  // dense core
  [0.10, 0.820, 20, 0.06],  // innermost pigment
];

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════

let selColor   = INK_COLORS[0];
let selSize    = DROP_SIZES[1];
let selCurrent = WATER_CURRENTS[0];
let activeDrops = [];
let audioCtx   = null;
let compressor = null;

// ═══════════════════════════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════════════════════════

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

// Background canvas: accumulates settled (finished) drops
const bgCanvas = document.createElement('canvas');
const bgCtx    = bgCanvas.getContext('2d');

function resize() {
  const w = window.innerWidth;
  const h = window.innerHeight;
  if (canvas.width === w && canvas.height === h) return;

  // Save and restore bgCanvas content across resize
  const tmp    = document.createElement('canvas');
  tmp.width    = bgCanvas.width || w;
  tmp.height   = bgCanvas.height || h;
  tmp.getContext('2d').drawImage(bgCanvas, 0, 0);

  canvas.width   = w; canvas.height   = h;
  bgCanvas.width = w; bgCanvas.height = h;

  bgCtx.drawImage(tmp, 0, 0);
}

resize();
window.addEventListener('resize', resize);

// ═══════════════════════════════════════════════════════════
// MATH HELPERS
// ═══════════════════════════════════════════════════════════

function hexToRgb(hex) {
  return {
    r: parseInt(hex.slice(1,3), 16),
    g: parseInt(hex.slice(3,5), 16),
    b: parseInt(hex.slice(5,7), 16),
  };
}

function midPt(a, b) {
  return { x: (a.x + b.x) * 0.5, y: (a.y + b.y) * 0.5 };
}

function easeOutQuart(t) {
  return 1 - Math.pow(1 - t, 4);
}

// Generate randomized control points for one organic blob
function makeBlobPts(n, irregularity) {
  const step = (Math.PI * 2) / n;
  const pts  = [];
  for (let i = 0; i < n; i++) {
    const jitter = (Math.random() - 0.5) * step * 0.38;
    const r      = 1 - irregularity * 0.5 + Math.random() * irregularity;
    pts.push({ a: i * step + jitter, r: Math.max(0.32, Math.min(1.52, r)) });
  }
  pts.sort((a, b) => a.a - b.a);
  return pts;
}

// Build a smooth closed path through blob control points
function blobPath(pts, cx, cy, radius) {
  const path   = new Path2D();
  const n      = pts.length;
  const coords = pts.map(p => ({
    x: cx + Math.cos(p.a) * radius * p.r,
    y: cy + Math.sin(p.a) * radius * p.r,
  }));
  const start = midPt(coords[n - 1], coords[0]);
  path.moveTo(start.x, start.y);
  for (let i = 0; i < n; i++) {
    const ctrl = coords[i];
    const next = coords[(i + 1) % n];
    path.quadraticCurveTo(ctrl.x, ctrl.y, midPt(ctrl, next).x, midPt(ctrl, next).y);
  }
  path.closePath();
  return path;
}

// ═══════════════════════════════════════════════════════════
// INK DROP CLASS
// ═══════════════════════════════════════════════════════════

class InkDrop {
  constructor(x, y, colorObj, sizeConfig, currentConfig) {
    this.cx0 = x;
    this.cy0 = y;
    this.rgb = hexToRgb(colorObj.hex);

    const minDim       = Math.min(canvas.width, canvas.height);
    this.maxRadius     = minDim * sizeConfig.factor;

    // Current drift: total pixels to shift by end of bloom
    const driftMag     = this.maxRadius * 0.20;
    this.driftX        = currentConfig.vx * driftMag;
    this.driftY        = currentConfig.vy * driftMag;

    this.t0       = performance.now();
    // Larger drops bloom longer; add slight randomness
    const sizeMult     = sizeConfig.factor / DROP_SIZES[1].factor;
    this.duration = (4500 + Math.random() * 3000) * Math.pow(sizeMult, 0.55);

    this.progress      = 0;
    this.currentRadius = 0;
    this.cx = x;
    this.cy = y;

    // Pre-generate unique blob shapes for each layer
    this.layerPts = BLOB_LAYERS.map(([,, n, irr]) => makeBlobPts(n, irr));
  }

  /** Returns true while still animating */
  update(now) {
    const raw     = Math.min((now - this.t0) / this.duration, 1);
    const eased   = easeOutQuart(raw);

    this.currentRadius = eased * this.maxRadius;
    this.cx = this.cx0 + this.driftX * eased;
    this.cy = this.cy0 + this.driftY * eased;

    return raw < 1;
  }

  draw(targetCtx) {
    if (this.currentRadius < 0.5) return;
    const { r, g, b }       = this.rgb;
    const { cx, cy }        = this;
    const rad               = this.currentRadius;

    for (let li = 0; li < BLOB_LAYERS.length; li++) {
      const [rf, alpha] = BLOB_LAYERS[li];
      const layerR      = rad * rf;
      const pts         = this.layerPts[li];
      const path        = blobPath(pts, cx, cy, layerR);

      const grad = targetCtx.createRadialGradient(cx, cy, 0, cx, cy, layerR);
      grad.addColorStop(0.00, `rgba(${r},${g},${b},${alpha.toFixed(3)})`);
      grad.addColorStop(0.45, `rgba(${r},${g},${b},${(alpha * 0.80).toFixed(3)})`);
      grad.addColorStop(0.78, `rgba(${r},${g},${b},${(alpha * 0.35).toFixed(3)})`);
      grad.addColorStop(1.00, `rgba(${r},${g},${b},0)`);

      targetCtx.fillStyle = grad;
      targetCtx.fill(path);
    }
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════════════

function render(now) {
  // Update & settle completed drops
  const alive = [];
  for (const drop of activeDrops) {
    if (drop.update(now)) {
      alive.push(drop);
    } else {
      drop.draw(bgCtx); // bake into static background
    }
  }
  activeDrops = alive;

  // Compose frame: white → settled drops → active drops
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(bgCanvas, 0, 0);
  for (const drop of activeDrops) drop.draw(ctx);

  requestAnimationFrame(render);
}

requestAnimationFrame(render);

// ═══════════════════════════════════════════════════════════
// SOUND — Tibetan singing bowl via Web Audio API
// ═══════════════════════════════════════════════════════════

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Dynamics compressor prevents clipping when many drops overlap
    compressor = audioCtx.createDynamicsCompressor();
    compressor.threshold.value = -18;
    compressor.knee.value      = 12;
    compressor.ratio.value     = 4;
    compressor.attack.value    = 0.003;
    compressor.release.value   = 0.25;
    compressor.connect(audioCtx.destination);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playGong() {
  ensureAudio();
  const ac  = audioCtx;
  const now = ac.currentTime;

  // Small pitch variance per hit
  const pitchScale = 0.88 + Math.random() * 0.24;
  const baseFreq   = 192 * pitchScale; // near G3
  const decay      = 5.8 + Math.random() * 5.2; // 5.8–11 s

  // Inharmonic partials of a metal singing bowl
  const partials = [
    { fm: 1.000, g: 0.52 },
    { fm: 2.756, g: 0.21 },
    { fm: 5.404, g: 0.09 },
    { fm: 8.933, g: 0.04 },
    { fm: 13.35, g: 0.02 },
  ];

  // Master volume envelope
  const master = ac.createGain();
  master.gain.setValueAtTime(0, now);
  master.gain.linearRampToValueAtTime(0.38, now + 0.007);
  master.gain.setTargetAtTime(0, now + 0.012, decay * 0.22);
  master.connect(compressor);

  // Feedback delay for room resonance / shimmer tail
  const delay   = ac.createDelay(0.6);
  const fbGain  = ac.createGain();
  const delayMs = 0.07 + Math.random() * 0.06;
  delay.delayTime.value = delayMs;
  fbGain.gain.value     = 0.16;
  delay.connect(fbGain);
  fbGain.connect(delay);   // feedback loop
  fbGain.connect(master);  // feed back into master

  partials.forEach(({ fm, g }) => {
    const freq = baseFreq * fm;
    const osc  = ac.createOscillator();
    const og   = ac.createGain();
    osc.type           = 'sine';
    osc.frequency.value = freq;
    og.gain.value       = g;

    // Subtle frequency LFO → slight shimmer / beating
    const lfo     = ac.createOscillator();
    const lfoAmt  = ac.createGain();
    lfo.frequency.value = 3.5 + Math.random() * 5.5; // 3.5–9 Hz
    lfoAmt.gain.value   = freq * 0.0025;
    lfo.connect(lfoAmt);
    lfoAmt.connect(osc.frequency);
    lfo.start(now);
    lfo.stop(now + decay + 0.5);

    osc.connect(og);
    og.connect(master);
    og.connect(delay);

    osc.start(now);
    osc.stop(now + decay + 0.5);
  });
}

// ═══════════════════════════════════════════════════════════
// INTERACTION
// ═══════════════════════════════════════════════════════════

function spawnDrop(x, y) {
  activeDrops.push(new InkDrop(x, y, selColor, selSize, selCurrent));
  playGong();
}

canvas.addEventListener('pointerdown', e => {
  if (e.button !== 0 && e.pointerType === 'mouse') return;
  e.preventDefault();
  spawnDrop(e.clientX, e.clientY);
});

// ═══════════════════════════════════════════════════════════
// BUILD TOOLBAR
// ═══════════════════════════════════════════════════════════

// — Colors —
const colorGroup = document.getElementById('color-group');
const swatchEls  = INK_COLORS.map((col, i) => {
  const el = document.createElement('div');
  el.className = 'swatch' + (i === 0 ? ' active' : '');
  el.style.background = col.hex;
  el.title = col.name;
  el.addEventListener('click', () => {
    swatchEls.forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    selColor = col;
  });
  colorGroup.appendChild(el);
  return el;
});

// — Sizes —
const sizeGroup = document.getElementById('size-group');
const sizeBtns  = DROP_SIZES.map((sz, i) => {
  const btn = document.createElement('div');
  btn.className = 'size-btn' + (i === 1 ? ' active' : '');
  btn.title = sz.label;
  const dot = document.createElement('div');
  dot.className = 'size-dot';
  dot.style.width  = sz.dotPx + 'px';
  dot.style.height = sz.dotPx + 'px';
  btn.appendChild(dot);
  btn.addEventListener('click', () => {
    sizeBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selSize = sz;
  });
  sizeGroup.appendChild(btn);
  return btn;
});

// — Currents —
const curGroup = document.getElementById('cur-group');
const curBtns  = WATER_CURRENTS.map((cur, i) => {
  const btn = document.createElement('div');
  btn.className = 'cur-btn' + (i === 0 ? ' active' : '');
  btn.textContent = cur.label;
  btn.addEventListener('click', () => {
    curBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selCurrent = cur;
  });
  curGroup.appendChild(btn);
  return btn;
});

// — Actions —
document.getElementById('btn-clear').addEventListener('click', () => {
  activeDrops = [];
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
});

document.getElementById('btn-export').addEventListener('click', () => {
  // Snapshot current visible frame (includes in-flight drops)
  const exp    = document.createElement('canvas');
  exp.width    = canvas.width;
  exp.height   = canvas.height;
  const ec     = exp.getContext('2d');
  ec.fillStyle = '#ffffff';
  ec.fillRect(0, 0, exp.width, exp.height);
  ec.drawImage(canvas, 0, 0);

  exp.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href     = url;
    a.download = `inkdrop-${Date.now()}.png`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);
  }, 'image/png');
});

// Block toolbar pointer events from reaching canvas
document.getElementById('toolbar').addEventListener('pointerdown', e => e.stopPropagation());
</script>
</body>
</html>
